name: faster
options:
  bundleIdPrefix: com.faster
  deploymentTarget:
    iOS: "17.5"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES

targets:
  faster:
    type: application
    platform: iOS
    sources:
      - path: faster
        excludes:
          - "Widgets/**"
    resources:
      - path: faster/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.faster.app
        INFOPLIST_FILE: faster/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: faster/faster.entitlements
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
    dependencies:
      - target: FastingWidgetExtension
    info:
      path: faster/Info.plist
      properties: {}

  FastingWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - faster/Widgets
      - faster/Core/Calculations
      - faster/Features/Fasting/LiveActivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.faster.app.FastingWidget
        INFOPLIST_FILE: faster/Widgets/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: faster/Widgets/FastingWidget.entitlements

  fasterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - fasterTests
    dependencies:
      - target: faster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.faster.app.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/faster.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/faster"

schemes:
  faster:
    build:
      targets:
        faster: all
        FastingWidgetExtension: all
    test:
      targets:
        - fasterTests
    run:
      config: Debug
    profile:
      config: Release
